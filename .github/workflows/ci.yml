name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Mirror the production image (Dockerfile): the scraper and football
        # model live in extras; without them pytest collection used to die
        # on ModuleNotFoundError (CI run 27413210078).
        run: uv sync --frozen --extra football --extra backfill

      - name: Tests
        run: uv run pytest -q

      - name: Lint
        run: uvx ruff check app tests

      - name: Format check
        run: uvx ruff format --check app tests

      - name: Types
        run: uv run mypy app

      - name: Safety audit (no bet-placement code path)
        run: bash scripts/safety_audit.sh

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
