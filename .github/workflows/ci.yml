name: CI

on:
  push:
    branches: [main]
  pull_request:

# gitleaks-action v3 lists PR commits via the API on pull_request events —
# the default restricted GITHUB_TOKEN (contents: read only) 403s without
# pull-requests: read.
permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # setup-uv publishes no moving major alias past v7 — pin the exact tag
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Mirror the production image (Dockerfile): the scraper and football
        # model live in extras; without them pytest collection used to die
        # on ModuleNotFoundError (CI run 27413210078).
        run: uv sync --frozen --extra football --extra backfill

      - name: Tests
        run: uv run pytest -q

      # Pin ruff so CI formatting matches local exactly — an unpinned `uvx ruff`
      # resolves whatever version the runner cached, which silently drifts from
      # the dev's ruff and fails format-check on identical code.
      - name: Lint
        run: uvx ruff@0.15.18 check app tests

      - name: Format check
        run: uvx ruff@0.15.18 format --check app tests

      - name: Types
        run: uv run mypy app

      - name: Safety audit (no bet-placement code path)
        run: bash scripts/safety_audit.sh

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
